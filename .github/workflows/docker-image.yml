name: Build & Push Docker image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker 标签'
        required: false
        default: 'latest'
        type: string
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository (no external actions)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
          git checkout "${GITHUB_SHA}"

      - name: Verify checked out commit SHA
        run: |
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "HEAD_SHA=$(git rev-parse HEAD)"
          if [ "$(git rev-parse HEAD)" != "${GITHUB_SHA}" ]; then
            echo "Error: checked out HEAD does not match GITHUB_SHA"
            exit 1
          fi

      - name: Set vars
        run: |
          echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/moontvplus" >> "$GITHUB_ENV"
          echo "TAG=${{ github.event.inputs.tag || 'latest' }}" >> "$GITHUB_ENV"

      - name: Login ghcr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push (linux/amd64)
        run: |
          docker build -f Dockerfile -t "${IMAGE}:${TAG}" .
          docker push "${IMAGE}:${TAG}"
